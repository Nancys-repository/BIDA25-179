<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">CRAVE IT DESSERTS</div>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a class="active" href="contact.html">Contact</a>
</nav>

</header>

<section class="categories">

<h2>Contact Us</h2>

<form id="contactForm" class="card"
style="padding:40px; max-width:600px; margin:auto;">

<input type="text"
id="name"
placeholder="Your Name"
required
style="width:100%; padding:15px; margin-bottom:20px;">

<input type="email"
id="email"
placeholder="Your Email"
required
style="width:100%; padding:15px; margin-bottom:20px;">

<textarea id="message"
placeholder="Your Message"
required
style="width:100%; height:150px; padding:15px;"></textarea>

<br><br>

<button class="btn" type="submit">
Send Message
</button>

</form>

</section>

<script>

document.getElementById("contactForm")
.addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let message = document.getElementById("message").value;

let whatsappMessage =
`Name: ${name}%0A
Email: ${email}%0A
Message: ${message}`;

window.open(
`https://wa.me/26778119183?text=${whatsappMessage}`,
"_blank"
);

});

</script>

</body>
</html>
